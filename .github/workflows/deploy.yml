name: Deploy to Vercel Production

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      deployments: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Bump version and create tag
        if: "!contains(github.event.head_commit.message, 'bump version')"
        run: |
          # Bump version
          npm version patch --no-git-tag-version
          VERSION=$(node -p 'require("./package.json").version')
          TAG="v${VERSION}"

          # Configure git
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Commit version bump
          git add package.json
          git diff --staged --quiet || git commit -m "chore: bump version to ${VERSION}"

          # Build changelog
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || true)
          if [ -n "$LAST_TAG" ]; then
            CHANGES=$(git log --oneline "${LAST_TAG}..HEAD" 2>/dev/null || true)
          else
            CHANGES=$(git log --oneline --all 2>/dev/null | head -10)
            [ -z "$CHANGES" ] && CHANGES="(initial commit)"
          fi

          # Format changelog with bullet points
          TAG_MSG="Release ${TAG}"
          if [ -n "$CHANGES" ]; then
            FORMATTED_CHANGES=$(echo "$CHANGES" | sed 's/^/• /')
            TAG_MSG="Release ${TAG}

          ${FORMATTED_CHANGES}"
          fi

          # Create annotated tag
          git tag -a "${TAG}" -m "${TAG_MSG}"

          # Push changes and tag
          git push
          git push origin "${TAG}"

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v42
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: --prod
          github-deployment: true

name: Deploy to Vercel Production

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build project
        run: npm run build

      - name: Prepare deploy directory
        run: |
          rm -rf deploy
          mkdir -p deploy
          cp -r dist deploy/dist
          cp package.json deploy/
          cat > deploy/vercel.json << 'EOF'
          {
            "buildCommand": "",
            "outputDirectory": "dist",
            "installCommand": "npm install",
            "framework": null,
            "functions": {
              "api/webhook.js": { "runtime": "nodejs22.x" },
              "api/cron/daily-question.js": { "runtime": "nodejs22.x" }
            },
            "crons": [
              {
                "path": "/api/cron/daily-question",
                "schedule": "0 9 * * *"
              }
            ]
          }
          EOF
          mkdir -p deploy/.vercel
          cat > deploy/.vercel/project.json << 'EOF'
          {
            "projectId": "${{ secrets.VERCEL_PROJECT_ID }}",
            "orgId": "${{ secrets.VERCEL_ORG_ID }}"
          }
          EOF

      - name: Deploy to Vercel
        run: npx vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: ./deploy
